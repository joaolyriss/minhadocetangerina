<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Decisões</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8a0b0;
    --rose-deep: #c96f8a;
    --rose-light: #f5d6de;
    --blush: #fdf0f3;
    --lilac: #d9b8d4;
    --lilac-deep: #9b6e9b;
    --cream: #fef8f0;
    --text-dark: #3a2030;
    --text-mid: #7a4060;
  }

  html, body {
    min-height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  body {
    background: radial-gradient(ellipse at 20% 20%, #fde8ee 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #ead8f0 0%, transparent 50%),
                var(--cream);
  }

  #screen-intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    position: relative;
  }

  .deco-circle {
    position: fixed;
    border-radius: 50%;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .deco-circle-1 {
    width: 400px; height: 400px;
    background: var(--rose);
    top: -100px; left: -100px;
  }
  .deco-circle-2 {
    width: 300px; height: 300px;
    background: var(--lilac);
    bottom: -80px; right: -80px;
  }

  .intro-content {
    position: relative;
    z-index: 1;
    max-width: 560px;
  }

  .intro-tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rose-deep);
    background: var(--rose-light);
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 1.8rem;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 600;
    line-height: 1.35;
    color: var(--text-dark);
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--text-mid);
    margin-bottom: 3rem;
    font-style: italic;
    font-family: 'Lora', serif;
  }

  .buttons-wrap {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    padding: 14px 36px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    letter-spacing: 0.02em;
  }
  .btn:active { transform: scale(0.97); }

  #btn-desistir {
    background: #e8e0e4;
    color: #8a7080;
    position: fixed;
    z-index: 100;
    transition: top 0.35s cubic-bezier(.22,.68,0,1.2), left 0.35s cubic-bezier(.22,.68,0,1.2),
                opacity 0.4s ease, transform 0.15s ease;
  }
  #btn-desistir:hover { box-shadow: none; }

  #btn-continuar {
    background: linear-gradient(135deg, var(--rose-deep), var(--lilac-deep));
    color: #fff;
    box-shadow: 0 4px 24px rgba(201,111,138,0.35);
  }
  #btn-continuar:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(201,111,138,0.45);
  }

  #joke-msg {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--rose-light);
    color: var(--rose-deep);
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.95rem;
    padding: 10px 24px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 200;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  #joke-msg.show { opacity: 1; }

  /* ── FINAL SCREEN ── */
  #screen-final {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
    flex-direction: column;
  }
  #screen-final.active { display: flex; }

  .petals-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .final-card {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(232,160,176,0.4);
    border-radius: 24px;
    padding: 2.8rem 2.4rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 48px rgba(201,111,138,0.15);
  }

  .final-rose {
    font-size: 2.8rem;
    margin-bottom: 1.2rem;
    display: block;
    animation: bloom 0.6s ease both;
  }
  @keyframes bloom {
    from { transform: scale(0.5) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .msg-line {
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    line-height: 1.7;
    color: var(--text-dark);
    margin-bottom: 0.9rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .msg-line.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .msg-line.accent {
    font-weight: 600;
    color: var(--rose-deep);
  }

  #btn-restart {
    background: transparent;
    color: var(--rose-deep);
    border: 1.5px solid var(--rose);
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.15s ease, box-shadow 0.15s ease;
    font-size: 0.88rem;
    padding: 10px 22px;
  }
  #btn-restart.visible { opacity: 1; }
  #btn-restart:hover { background: var(--rose-light); box-shadow: none; }

  .final-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 1.8rem;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .final-btns.visible { opacity: 1; }

  .btn-hug {
    background: linear-gradient(135deg, var(--rose-deep), var(--lilac-deep));
    color: #fff;
    font-size: 0.88rem;
    padding: 10px 22px;
    box-shadow: 0 4px 18px rgba(201,111,138,0.3);
  }
  .btn-hug:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(201,111,138,0.45); }

  .btn-sos {
    background: transparent;
    color: #b04060;
    border: 1.5px solid #e07090;
    font-size: 0.88rem;
    padding: 10px 22px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-sos:hover { background: #fdeaef; box-shadow: none; }

  .hug-msg {
    font-family: 'Lora', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--rose-deep);
    line-height: 1.6;
    margin-top: 1rem;
    opacity: 0;
    transform: scale(0.95);
    transition: opacity 0.5s ease, transform 0.5s ease;
    min-height: 0;
  }
  .hug-msg.visible {
    opacity: 1;
    transform: scale(1);
  }
</style>
</head>
<body>

<div class="deco-circle deco-circle-1"></div>
<div class="deco-circle deco-circle-2"></div>

<div id="joke-msg"></div>

<!-- INTRO SCREEN -->
<section id="screen-intro">
  <div class="intro-content">
    <span class="intro-tag">um momento só seu</span>
    <h1>Você está cansada e quer desistir.<br>O que fazer?</h1>
    <p class="subtitle">escolha com cuidado...</p>
    <div class="buttons-wrap">
      <button class="btn" id="btn-desistir">Desistir</button>
      <button class="btn" id="btn-continuar">Continuar ✦</button>
    </div>
  </div>
</section>

<!-- FINAL SCREEN -->
<section id="screen-final">
  <canvas class="petals-canvas" id="petals"></canvas>
  <div class="final-card">
    <span class="final-rose">🌹</span>
    <div class="msg-line" id="msg-random"></div>
    <div id="hug-msg" class="hug-msg"></div>
    <div class="final-btns">
      <button class="btn" id="btn-restart">Preciso disso de novo</button>
      <button class="btn btn-hug" id="btn-hug">Me abraça</button>
      <a class="btn btn-sos" href="https://wa.me/5537991217772?text=Necessito%20de%20um%20abra%C3%A7o%20seu!" target="_blank">🚨 URGENTE</a>
    </div>
  </div>
</section>

<script>
  const jokes = [
    "Tá tentando mesmo né? 👀",
    "Hmm, não vai ser tão fácil assim...",
    "O botão também não quer que você desista 🐢",
    "Tô vendo que você tá persistindo... curioso né?",
    "Esse botão tem pernas próprias ao que parece...",
    "Última chance de tentar desistir...",
    "Tá bem, você me convenço. Hora de continuar! ✦"
  ];

  const btnD = document.getElementById('btn-desistir');
  const btnC = document.getElementById('btn-continuar');
  const jokeEl = document.getElementById('joke-msg');
  const intro = document.getElementById('screen-intro');
  const final = document.getElementById('screen-final');

  let fleeCount = 0;
  const maxFlee = 6;
  let jokeTimeout;

  function showJoke(txt) {
    jokeEl.textContent = txt;
    jokeEl.classList.add('show');
    clearTimeout(jokeTimeout);
    jokeTimeout = setTimeout(() => jokeEl.classList.remove('show'), 2200);
  }

  function fleeTo() {
    const margin = 80;
    const bw = btnD.offsetWidth;
    const bh = btnD.offsetHeight;
    const maxX = window.innerWidth - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    const x = Math.random() * (maxX - margin) + margin;
    const y = Math.random() * (maxY - margin) + margin;
    btnD.style.left = x + 'px';
    btnD.style.top = y + 'px';
  }

  // init position
  window.addEventListener('load', () => {
    btnD.style.left = (window.innerWidth / 2 - btnD.offsetWidth / 2 - 80) + 'px';
    btnD.style.top  = (window.innerHeight / 2 + 20) + 'px';
    btnC.style.position = 'fixed';
    btnC.style.left = (window.innerWidth / 2 - btnC.offsetWidth / 2 + 80) + 'px';
    btnC.style.top  = (window.innerHeight / 2 + 20) + 'px';
  });

  btnD.addEventListener('mouseenter', () => {
    if (fleeCount >= maxFlee) return;
    fleeCount++;
    showJoke(jokes[Math.min(fleeCount - 1, jokes.length - 1)]);
    fleeTo();
    if (fleeCount >= maxFlee) {
      setTimeout(() => {
        btnD.style.opacity = '0';
        btnD.style.pointerEvents = 'none';
      }, 400);
    }
  });

  btnD.addEventListener('click', () => {
    if (fleeCount < maxFlee) {
      fleeCount++;
      showJoke(jokes[Math.min(fleeCount - 1, jokes.length - 1)]);
      fleeTo();
      if (fleeCount >= maxFlee) {
        setTimeout(() => {
          btnD.style.opacity = '0';
          btnD.style.pointerEvents = 'none';
        }, 400);
      }
    }
  });

  // mobile: touch flee
  btnD.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (fleeCount >= maxFlee) return;
    fleeCount++;
    showJoke(jokes[Math.min(fleeCount - 1, jokes.length - 1)]);
    fleeTo();
    if (fleeCount >= maxFlee) {
      setTimeout(() => {
        btnD.style.opacity = '0';
        btnD.style.pointerEvents = 'none';
      }, 400);
    }
  }, { passive: false });

  function goFinal() {
    intro.style.opacity = '0';
    intro.style.transition = 'opacity 0.6s ease';
    setTimeout(() => {
      intro.style.display = 'none';
      final.classList.add('active');
      startPetals();
      revealMessages();
    }, 600);
  }

  btnC.addEventListener('click', goFinal);

  const messages = [
    { text: "Eu sabia que você não ia desistir.", accent: false },
    { text: "Você luta contra seus dragões todo dia — e vence.", accent: false },
    { text: "Deus colocou o chão no começo.\nEle não vai te deixar pisar em falso agora.", accent: true },
    { text: "Vai no seu passinho de tartaruga. 🐢\nUm de cada vez.", accent: false },
    { text: "Você já está vencendo.\nMesmo quando não parece.", accent: false },
    { text: "E enquanto o chão não estiver firme —\nestarei aqui segurando a sua mão. 🌹", accent: true },
    { text: "Do caos, você floresce. 🌸", accent: true },
    { text: "Ser forte não é não cair.\nÉ se levantar de novo, sempre.", accent: false },
    { text: "Você não precisa ter tudo resolvido\npra merecer descanso.", accent: false },
    { text: "Aquela menina que começou tudo sozinha\nje orgulharia demais de você.", accent: true }
  ];

  function revealMessages() {
    const el = document.getElementById('msg-random');
    const btnR = document.getElementById('btn-restart');
    const last = parseInt(localStorage.getItem('lastMsgIndex') ?? '-1');
    let idx;
    do { idx = Math.floor(Math.random() * messages.length); } while (idx === last && messages.length > 1);
    localStorage.setItem('lastMsgIndex', idx);
    const msg = messages[idx];
    el.innerHTML = msg.text.replace(/\n/g, '<br>');
    if (msg.accent) el.classList.add('accent');
    setTimeout(() => el.classList.add('visible'), 400);
    setTimeout(() => {
      btnR.classList.add('visible');
      document.querySelector('.final-btns').classList.add('visible');
    }, 1400);
  }

  document.getElementById('btn-restart').addEventListener('click', () => location.reload());

  const hugMessages = [
    "EIIIIII, EU TE AMO TA, MINHA LINDA, ALINE LISPECTOR, MINHA TANGERINA 🍊🌹",
  ];

  document.getElementById('btn-hug').addEventListener('click', () => {
    const hugEl = document.getElementById('hug-msg');
    hugEl.textContent = hugMessages[0];
    hugEl.classList.add('visible');
  });

  // Petals canvas
  function startPetals() {
    const canvas = document.getElementById('petals');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const petals = [];
    const colors = ['#f4b8c8','#e891aa','#f9d0da','#d4a8cc','#f0c0d4','#e8b0c8'];

    for (let i = 0; i < 45; i++) {
      petals.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        w: 10 + Math.random() * 14,
        h: 6 + Math.random() * 9,
        speed: 0.6 + Math.random() * 1.2,
        drift: (Math.random() - 0.5) * 0.8,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.04,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 0.55 + Math.random() * 0.4,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.01 + Math.random() * 0.02
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      petals.forEach(p => {
        p.y += p.speed;
        p.x += p.drift + Math.sin(p.wobble) * 0.4;
        p.wobble += p.wobbleSpeed;
        p.rot += p.rotSpeed;
        if (p.y > canvas.height + 20) {
          p.y = -20;
          p.x = Math.random() * canvas.width;
        }
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, p.w / 2, p.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    draw();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  }
</script>
</body>
</html>
